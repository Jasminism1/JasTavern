<script>
(function() {
    'use strict';

    // --- Background Adjustment Logic ---
    const IMAGE_ASPECT_RATIO = 832 / 1216;

    function adjustBackground() {
        const container = document.querySelector('.entry-container');
        const backgroundImage = document.querySelector('.background-container-image');
        if (!container || !backgroundImage) return;

        const containerHeight = container.offsetHeight;
        const containerWidth = container.offsetWidth;

        if (containerWidth === 0) return;

        const imageHeightAtFullWidth = containerWidth * IMAGE_ASPECT_RATIO;

        if (containerHeight > imageHeightAtFullWidth) {
            backgroundImage.style.backgroundSize = 'cover';
            backgroundImage.style.backgroundPosition = 'center center';
        } else {
            backgroundImage.style.backgroundSize = '100% auto';
            backgroundImage.style.backgroundPosition = 'top center';
        }
    }

    // Use ResizeObserver for better performance and accuracy
    const container = document.querySelector('.entry-container');
    if (container) {
        const observer = new ResizeObserver(() => {
            adjustBackground();
        });
        observer.observe(container);
    }
    
    // Initial call
    adjustBackground();


    // --- SillyTavern API Integration ---
    if (typeof eventOn === 'undefined' || typeof eventEmit === 'undefined') {
        console.error('SillyTavern event system not found.');
        if(container) container.innerHTML = '<p style="color:red;">错误：SillyTavern API 未找到。</p>';
        return;
    }

    const startButton = document.getElementById('start-game-btn');
    const statusSummary = document.getElementById('status-summary');

    // 核心修改：从iframe内部跳出，直接挂载到顶层窗口
    startButton.addEventListener('click', () => {
        console.log('[入口前端] 正在打开酒馆全局全屏UI...');
        statusSummary.textContent = '正在加载UI...';

        openGlobalTavernFullscreen('https://jasminism1.github.io/JasTavern');
        statusSummary.textContent = 'UI已成功打开';
    });

    const addFloorButton = document.getElementById('add-floor-btn');
    if (addFloorButton) {
        addFloorButton.addEventListener('click', () => {
            if (typeof createChatMessages === 'function') {
                console.log('[入口前端] 新建空楼层...');
                statusSummary.textContent = '正在创建空楼层...';
                createChatMessages([{ role: 'user', message: '<char>' }])
                    .then(() => {
                        console.log('[入口前端] 空楼层已创建。');
                        if (statusSummary) {
                            statusSummary.textContent = '空楼层已成功创建。';
                        }
                    })
                    .catch(err => {
                        console.error('[入口前端] 创建空楼层失败:', err);
                        if (statusSummary) {
                            statusSummary.textContent = '创建空楼层失败。';
                        }
                    });
            } else {
                console.error('[入口前端] createChatMessages function not found.');
                if (statusSummary) {
                    statusSummary.textContent = '错误: SillyTavern API (createChatMessages) 未找到。';
                }
            }
        });
    }

    eventOn('my_game:update_status', (summary) => {
        console.log('[入口前端] 收到状态更新:', summary);
        if (statusSummary) {
            statusSummary.textContent = summary;
        }
    });

    // ==============================================
    // 酒馆全局全屏核心函数（从iframe跳出到顶层窗口）
    // ==============================================
    function openGlobalTavernFullscreen(url) {
        // 获取顶层窗口（整个酒馆页面）
        const topWindow = window.top;
        const topDocument = topWindow.document;

        // 检查是否已经打开了全屏UI
        if (topDocument.getElementById('global-tavern-fullscreen-container')) {
            console.warn('[入口前端] 全局全屏UI已经打开');
            return;
        }

        // 在顶层窗口创建全屏容器
        const fullscreenContainer = topDocument.createElement('div');
        fullscreenContainer.id = 'global-tavern-fullscreen-container';
        fullscreenContainer.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999999; /* 覆盖酒馆所有元素 */
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
        `;

        // 创建iframe加载你的Vercel UI
        const iframe = topDocument.createElement('iframe');
        iframe.src = url;
        iframe.style.cssText = `
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
        `;
        iframe.allowFullscreen = true;
        iframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals';

        // 创建关闭按钮（右上角）
        const closeButton = topDocument.createElement('button');
        closeButton.textContent = '×';
        closeButton.title = '按ESC键也可关闭';
        closeButton.style.cssText = `
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
            cursor: pointer;
            z-index: 1000000;
            transition: all 0.2s ease;
            padding: 0;
            font-family: Arial, sans-serif;
        `;

        // 关闭按钮悬停效果
        closeButton.addEventListener('mouseenter', () => {
            closeButton.style.background = 'rgba(126, 0, 243, 0.8)';
            closeButton.style.transform = 'scale(1.1)';
        });
        closeButton.addEventListener('mouseleave', () => {
            closeButton.style.background = 'rgba(0, 0, 0, 0.5)';
            closeButton.style.transform = 'scale(1)';
        });

        // 关闭函数
        function closeFullscreen() {
            if (topDocument.body.contains(fullscreenContainer)) {
                topDocument.body.removeChild(fullscreenContainer);
                topWindow.removeEventListener('keydown', escKeyHandler);
                statusSummary.textContent = 'UI已关闭';
                console.log('[入口前端] 全局全屏UI已关闭');
            }
        }

        // ESC键关闭功能（绑定在顶层窗口）
        function escKeyHandler(e) {
            if (e.key === 'Escape') {
                closeFullscreen();
            }
        }

        // 绑定关闭事件
        closeButton.addEventListener('click', closeFullscreen);
        topWindow.addEventListener('keydown', escKeyHandler);

        // ==============================================
        // ST 数据桥：读取顶层窗口的 SillyTavern 数据，
        // 通过 postMessage 传入跨域 iframe
        // ==============================================
        iframe.addEventListener('load', async () => {
            try {
                const stData = await readStContext(topWindow);
                if (stData) {
                    iframe.contentWindow.postMessage(
                        { type: 'st-context', data: stData },
                        '*'
                    );
                    console.log('[入口前端] ST 上下文已发送到 UI iframe');
                } else {
                    console.warn('[入口前端] 未检测到 ST 上下文，将使用独立模式');
                }
            } catch (err) {
                console.warn('[入口前端] ST 上下文读取失败:', err);
            }
        });

        // 组装DOM并挂载到顶层窗口的body上
        fullscreenContainer.appendChild(iframe);
        fullscreenContainer.appendChild(closeButton);
        topDocument.body.appendChild(fullscreenContainer);

        console.log('[入口前端] 酒馆全局全屏UI已成功挂载到顶层窗口');
    }

    // ==============================================
    // 从顶层窗口 IndexedDB 读取 ST 设置
    // ==============================================
    async function readSTIndexedDBSettings(topWindow) {
        // ST stores presets in specific databases. Try known names first.
        var dbNameStoreMap = {
            'SillyTavern_ChatCompletions': ['presets', 'ChatCompletions', 'chat_completions'],
            'SillyTavern_Prompts': ['prompts', 'Prompts'],
            'SillyTavern_TextCompletions': ['presets', 'TextCompletions'],
            'SillyTavern': ['settings', 'Settings', 'presets', 'Presets'],
            'st_main': ['settings', 'Settings'],
        };
        for (var dbName in dbNameStoreMap) {
            try {
                var storeNames = dbNameStoreMap[dbName];
                var db = await new Promise(function(resolve) {
                    var req = topWindow.indexedDB.open(dbName);
                    req.onsuccess = function() { resolve(req.result); };
                    req.onerror = function() { resolve(null); };
                    req.onblocked = function() { resolve(null); };
                });
                if (!db) continue;
                for (var si = 0; si < storeNames.length; si++) {
                    try {
                        if (!db.objectStoreNames.contains(storeNames[si])) continue;
                        var records = await new Promise(function(res) {
                            var tx = db.transaction(storeNames[si], 'readonly');
                            var store = tx.objectStore(storeNames[si]);
                            var getAll = store.getAll();
                            getAll.onsuccess = function() { res(getAll.result); };
                            getAll.onerror = function() { res(null); };
                        });
                        if (records && records.length > 0) {
                            // Return the first record that's an object (most presets are the first item)
                            if (records[0] && typeof records[0] === 'object') {
                                db.close();
                                console.log('[入口前端] ST 设置来源: ' + dbName + '/' + storeNames[si], records[0]);
                                return records[0];
                            }
                        }
                    } catch(e) {}
                }
                db.close();
            } catch(e) {}
        }
        // Fallback: scan all IDB databases generically
        try {
            if (topWindow.indexedDB && topWindow.indexedDB.databases) {
                var allDbs = await topWindow.indexedDB.databases();
                for (var di = 0; di < allDbs.length; di++) {
                    var db2 = await new Promise(function(resolve) {
                        var req = topWindow.indexedDB.open(allDbs[di].name);
                        req.onsuccess = function() { resolve(req.result); };
                        req.onerror = function() { resolve(null); };
                        req.onblocked = function() { resolve(null); };
                    });
                    if (!db2) continue;
                    var sNames = Array.from(db2.objectStoreNames || []);
                    for (var sj = 0; sj < sNames.length; sj++) {
                        try {
                            var recs = await new Promise(function(res) {
                                var tx = db2.transaction(sNames[sj], 'readonly');
                                var store = tx.objectStore(sNames[sj]);
                                var getAll = store.getAll();
                                getAll.onsuccess = function() { res(getAll.result); };
                                getAll.onerror = function() { res(null); };
                            });
                            if (recs) {
                                for (var rj = 0; rj < recs.length; rj++) {
                                    var r = recs[rj];
                                    if (r && typeof r === 'object' && !Array.isArray(r) && Object.keys(r).length > 3) {
                                        // Accept any non-trivial object as potential settings
                                        db2.close();
                                        console.log('[入口前端] ST 设置来源(gen): ' + allDbs[di].name + '/' + sNames[sj], r);
                                        return r;
                                    }
                                }
                            }
                        } catch(e) {}
                    }
                    db2.close();
                }
            }
        } catch(e) {}
        return null;
    }

    // ==============================================
    // 从顶层窗口 IndexedDB 读取 ST 世界书
    // ==============================================
    async function readSTIndexedDBWorldInfo(topWindow) {
        try {
            if (!topWindow.indexedDB || !topWindow.indexedDB.databases) return null;
            var allDbs = await topWindow.indexedDB.databases();
            for (var di = 0; di < allDbs.length; di++) {
                try {
                    var dbName = allDbs[di].name;
                    var db = await new Promise(function(resolve, reject) {
                        var req = topWindow.indexedDB.open(dbName);
                        req.onsuccess = function() { resolve(req.result); };
                        req.onerror = function() { resolve(null); };
                        req.onblocked = function() { resolve(null); };
                    });
                    if (!db) continue;
                    var storeNames = Array.from(db.objectStoreNames || []);
                    for (var si = 0; si < storeNames.length; si++) {
                        try {
                            var storeName = storeNames[si];
                            var records = await new Promise(function(res, rej) {
                                var tx = db.transaction(storeName, 'readonly');
                                var store = tx.objectStore(storeName);
                                var getAll = store.getAll();
                                getAll.onsuccess = function() { res(getAll.result); };
                                getAll.onerror = function() { rej(getAll.error); };
                            });
                            if (records && records.length > 0) {
                                for (var ri = 0; ri < records.length; ri++) {
                                    var r = records[ri];
                                    if (r && typeof r === 'object' && (r.entries || (r.key && r.content))) {
                                        db.close();
                                        // If it's a single entry, wrap it
                                        if (r.key && r.content) return { name: 'ST 世界书', entries: { '0': r } };
                                        return r;
                                    }
                                }
                            }
                        } catch(e) {}
                    }
                    db.close();
                } catch(e) {}
            }
        } catch(e) {}
        return null;
    }

    // ==============================================
    // 从顶层窗口读取 ST 完整上下文（全面扫描所有数据源）
    // ==============================================
    async function readStContext(topWindow) {
        try {
            var st = topWindow.SillyTavern;
            if (!st) { console.log('[入口前端] window.SillyTavern 不存在'); return null; }

            var ctx = st.getContext();
            if (!ctx) { console.log('[入口前端] getContext() 返回空'); return null; }

            var result = {
                characters: [],
                characterId: ctx.characterId,
                worldInfo: null,
                settings: null,
                chat: null,
                // Debug: what was found
                _sources: { settings: '', worldInfo: '' }
            };
            var ls = topWindow.localStorage;

            // ---- 角色 ----
            if (Array.isArray(ctx.characters)) {
                result.characters = ctx.characters.map(function(c) {
                    return {
                        name: c.name,
                        description: c.description || '',
                        personality: c.personality || '',
                        scenario: c.scenario || '',
                        first_mes: c.first_mes || '',
                        mes_example: c.mes_example || '',
                    };
                });
            }

            // ---- 世界书：多条路径 + IndexedDB ----
            // 1. ctx.worldInfo (live object)
            if (ctx.worldInfo && typeof ctx.worldInfo === 'object') {
                try {
                    result.worldInfo = JSON.parse(JSON.stringify(ctx.worldInfo));
                    result._sources.worldInfo = 'ctx.worldInfo';
                } catch(e) {}
            }
            // 2. IndexedDB
            if (!result.worldInfo) {
                try {
                    result.worldInfo = await readSTIndexedDBWorldInfo(topWindow);
                    if (result.worldInfo) result._sources.worldInfo = 'indexeddb';
                } catch(e) {}
            }
            // 2. 扫描所有 localStorage key
            if (!result.worldInfo) {
                var wiKeys = ['worldinfo', 'WorldInfo', 'world_info', 'WI_', 'worldinfo_'];
                for (var ki = 0; ki < ls.length && !result.worldInfo; ki++) {
                    var key = ls.key(ki);
                    if (!key) continue;
                    var lk = key.toLowerCase();
                    if (lk.indexOf('worldinfo') >= 0 || lk.indexOf('world_info') >= 0 || lk.indexOf('_wi') >= 0) {
                        try {
                            var raw = ls.getItem(key);
                            if (raw && raw.length > 10 && (raw[0] === '{' || raw[0] === '[')) {
                                var parsed = JSON.parse(raw);
                                if (parsed && (parsed.entries || (typeof parsed === 'object' && Object.keys(parsed).length > 0))) {
                                    result.worldInfo = parsed;
                                    result._sources.worldInfo = 'ls:' + key;
                                    break;
                                }
                            }
                        } catch(e) {}
                    }
                }
            }
            // 3. 从角色对象中读取内嵌 worldinfo
            if (!result.worldInfo && ctx.characters && ctx.characters.length > 0) {
                var activeIdx = typeof ctx.characterId === 'number' ? ctx.characterId : 0;
                var activeChar = ctx.characters[activeIdx] || ctx.characters[0];
                if (activeChar && activeChar.data && activeChar.data.worldinfo) {
                    try {
                        result.worldInfo = JSON.parse(JSON.stringify(activeChar.data.worldinfo));
                        result._sources.worldInfo = 'char.data.worldinfo';
                    } catch(e) {}
                }
            }

            // ---- ST 全局设置：IndexedDB 优先 ----
            try {
                var idbSettings = await readSTIndexedDBSettings(topWindow);
                if (idbSettings) {
                    result.settings = idbSettings;
                    result._sources.settings = 'indexeddb';
                }
            } catch(e) {}

            // Then try localStorage paths
            if (!result.settings) {
            var settingsKeys = [
                'SillyTavern_settings', 'settings', 'STSettings',
                'st_settings', 'tavern_settings', 'TavernAI_settings',
                'SillyTavern', 'ST_main', 'extensions_settings',
                'power_user', 'powerUser',
            ];
            for (var si = 0; si < settingsKeys.length && !result.settings; si++) {
                try {
                    var sRaw = ls.getItem(settingsKeys[si]);
                    if (sRaw && sRaw.length > 10) {
                        var sParsed = JSON.parse(sRaw);
                        if (sParsed && typeof sParsed === 'object') {
                            result.settings = sParsed;
                            result._sources.settings = 'ls:' + settingsKeys[si];
                            break;
                        }
                    }
                } catch(e) {}
            }
            // scan all ls keys
            if (!result.settings) {
                for (var sj = 0; sj < ls.length && !result.settings; sj++) {
                    var skey = ls.key(sj);
                    if (!skey) continue;
                    var slk = skey.toLowerCase();
                    if (slk.indexOf('setting') >= 0 || slk.indexOf('tavern') >= 0 || (skey.indexOf('ST') === 0 && skey.length > 3)) {
                        try {
                            var sRaw2 = ls.getItem(skey);
                            if (sRaw2 && sRaw2.length > 10 && sRaw2[0] === '{') {
                                var sParsed2 = JSON.parse(sRaw2);
                                if (sParsed2 && typeof sParsed2 === 'object' && (sParsed2.main || sParsed2.prompt_order || sParsed2.temperature || sParsed2.temp_openai)) {
                                    result.settings = sParsed2;
                                    result._sources.settings = 'ls-scan:' + skey;
                                    break;
                                }
                            }
                        } catch(e) {}
                    }
                }
            }
            if (!result.settings && ctx.settings) {
                result.settings = JSON.parse(JSON.stringify(ctx.settings));
                result._sources.settings = 'ctx.settings';
            }
            } // end !result.settings from IDB

            // ---- 对话历史 ----
            try {
                if (Array.isArray(ctx.chat)) {
                    result.chat = ctx.chat.slice(-50).map(function(m) {
                        return { is_user: !!m.is_user, mes: String(m.mes || ''), send_date: m.send_date || 0 };
                    });
                }
            } catch(e) {}

            console.log('[入口前端] ST 扫描结果:', {
                charCount: result.characters.length,
                hasWorldInfo: !!result.worldInfo,
                worldInfoSource: result._sources.worldInfo,
                hasSettings: !!result.settings,
                settingsSource: result._sources.settings,
                chatCount: result.chat ? result.chat.length : 0,
                // List all localStorage keys for debugging
                allLSKeys: (function() { var keys=[]; for(var i=0;i<ls.length;i++) keys.push(ls.key(i)); return keys; })(),
                // List IndexedDB database names
                idbNames: await (async function() {
                    try { if (topWindow.indexedDB && topWindow.indexedDB.databases) { var dbs = await topWindow.indexedDB.databases(); return dbs.map(function(d) { return d.name; }); } } catch(e) {}
                    return [];
                })()
            });

            return result;
        } catch(e) {
            console.error('[入口前端] readStContext 异常:', e);
            return null;
        }
    }

    console.log('[入口前端] 初始化完成，已准备好发送和接收事件。');

})();
</script>
